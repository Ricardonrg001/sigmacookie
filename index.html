<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SigmaCookie — Repostería Casera</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --cream: #fdf6ec;
      --brown-dark: #2c1a0e;
      --brown-mid: #6b3f1f;
      --brown-light: #c8845a;
      --caramel: #e8a96a;
      --accent: #d4572a;
      --text: #1e120a;
      --muted: #7a5c44;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* HERO */
    header {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(ellipse at 20% 50%, #e8c9a040 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, #c8845a30 0%, transparent 50%),
        var(--cream);
      position: relative;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8845a' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.6;
      pointer-events: none;
    }

    .logo-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.6s 0.2s forwards;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 10vw, 7rem);
      line-height: 1;
      color: var(--brown-dark);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      font-size: 1.1rem;
      color: var(--muted);
      font-weight: 300;
      margin-top: 1rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.6s forwards;
    }

    .cta-btn {
      display: inline-block;
      background: var(--brown-dark);
      color: var(--cream);
      padding: 1rem 2.5rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.04em;
      transition: background 0.25s, transform 0.2s;
      opacity: 0;
      animation: fadeUp 0.7s 0.8s forwards;
    }

    .cta-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.7s 1.2s forwards;
    }

    /* PRODUCTS */
    .products-section {
      padding: 6rem 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      text-align: center;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--brown-light);
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      text-align: center;
      color: var(--brown-dark);
      margin-bottom: 3.5rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }

    .card {
      background: white;
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(44,26,14,0.08);
      transition: transform 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(44,26,14,0.14);
    }

    .card-img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      background: linear-gradient(135deg, #f5e6d3, #e8c9a0);
    }

    .card-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--brown-dark);
      margin-bottom: 0.4rem;
    }

    .card-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      margin-bottom: 1rem;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: auto;
    }

    .card-price {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .qty-btn {
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      border: 1.5px solid var(--brown-light);
      background: transparent;
      color: var(--brown-mid);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
    }

    .qty-btn:hover {
      background: var(--brown-dark);
      color: white;
      border-color: var(--brown-dark);
    }

    .qty-num {
      min-width: 1.5rem;
      text-align: center;
      font-weight: 500;
      font-size: 1rem;
    }

    /* ── CARRITO FLOTANTE ── */
    #cart-toggle {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      background: var(--brown-dark);
      color: var(--cream);
      border: none;
      border-radius: 999px;
      padding: 0.85rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 6px 24px rgba(44,26,14,0.28);
      transition: background 0.2s, transform 0.2s;
    }

    #cart-toggle:hover {
      background: var(--accent);
      transform: translateY(-2px);
    }

    #cart-badge {
      background: var(--accent);
      color: white;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      min-width: 1.3rem;
      height: 1.3rem;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 0.3rem;
    }

    #cart-badge.visible {
      display: flex;
    }

    /* Panel lateral */
    #cart-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 360px;
      max-width: 95vw;
      background: var(--brown-dark);
      color: var(--cream);
      z-index: 1100;
      display: flex;
      flex-direction: column;
      transform: translateX(110%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: -8px 0 40px rgba(44,26,14,0.35);
    }

    #cart-panel.open {
      transform: translateX(0);
    }

    .cart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .cart-header-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
    }

    .cart-close {
      background: none;
      border: none;
      color: var(--caramel);
      font-size: 1.5rem;
      cursor: pointer;
      line-height: 1;
      padding: 0.2rem 0.4rem;
      border-radius: 0.5rem;
      transition: background 0.2s;
    }

    .cart-close:hover {
      background: rgba(255,255,255,0.1);
    }

    .cart-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
    }

    .cart-body::-webkit-scrollbar { width: 4px; }
    .cart-body::-webkit-scrollbar-track { background: transparent; }
    .cart-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    #summary {
      font-size: 0.95rem;
      line-height: 2;
      color: #e8d5c0;
    }

    .cart-footer {
      padding: 1.25rem 1.5rem 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .notes-input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 0.75rem;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      resize: none;
      outline: none;
    }

    .notes-input::placeholder { color: #a08060; }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #25D366;
      color: white;
      padding: 0.9rem 1.5rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.2s;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
    }

    .whatsapp-btn:hover {
      background: #1ebe5d;
      transform: translateY(-2px);
    }

    .whatsapp-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
      flex-shrink: 0;
    }

    /* Overlay oscuro cuando el panel está abierto */
    #cart-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1050;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    #cart-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--cream);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 500px) {
      .products-grid { grid-template-columns: 1fr; }
      #cart-toggle { bottom: 1.25rem; right: 1.25rem; }
    }
  </style>
</head>
<body>

<!-- HERO -->
<header>
  <p class="logo-tag">Repostería casera · Garín</p>
  <h1>SIGMA<em>COOKIE</em></h1>
  <p class="subtitle">Brownies y delicias hechas con amor, por encargo.</p>
  <a href="#productos" class="cta-btn">Ver el menú</a>
  <p class="scroll-hint">↓ abajo</p>
</header>

<!-- PRODUCTOS -->
<section class="products-section" id="productos">
  <p class="section-label">Lo que hacemos</p>
  <h2 class="section-title">Nuestros productos</h2>
  <div class="products-grid" id="grid"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>📍 Garín, Buenos Aires &nbsp;·&nbsp; Pedidos por WhatsApp</p>
  <p style="margin-top:0.4rem;">Hecho con 🍫 y mucho amor</p>
</footer>

<!-- OVERLAY -->
<div id="cart-overlay" onclick="closeCart()"></div>

<!-- BOTÓN FLOTANTE -->
<button id="cart-toggle" onclick="toggleCart()">
  🍪 Tu pedido
  <span id="cart-badge"></span>
</button>

<!-- PANEL LATERAL -->
<div id="cart-panel">
  <div class="cart-header">
    <span class="cart-header-title">Tu pedido</span>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-body">
    <div id="summary">
      <span style="display:flex;align-items:center;justify-content:center;min-height:80px;width:100%;color:#a08060;font-style:italic;">
        Todavía no agregaste nada 🍫
      </span>
    </div>
  </div>
  <div class="cart-footer">
    <textarea class="notes-input" id="notes" rows="3" placeholder="Aclaraciones: alergias, dirección, horario preferido..."></textarea>
    <button class="whatsapp-btn" onclick="sendOrder()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Hacer pedido por WhatsApp
    </button>
  </div>
</div>

<script>
  const WHATSAPP_NUMBER = "5491127705819";
  const SHOP_NAME = "SigmaCookie";

  const categories = [
    {
      name: "Brownies",
      products: [
        { id: 1, emoji: "🍫", name: "Brownie clásico", desc: "Húmedo, intenso.", price: 800, unit: "unidad" },
      ]
    },
    {
      name: "Galletitas & Cookies",
      products: [
        { id: 2, emoji: "🍪", name: "Alfajor de maicena", desc: "Cubierto en coco rallado.", price: 950, unit: "unidad" },
        { id: 3, emoji: "🍪", name: "Cookies", desc: "Con chispas de chocolate.", price: 600, unit: "media docena" },
      ]
    },
    {
      name: "Budines",
      products: [
        { id: 4, emoji: "🍰", name: "Budín chico", desc: "Húmedo y sabroso.", price: 600, unit: "unidad" },
        { id: 5, emoji: "🍰", name: "Budín grande", desc: "Para compartir.", price: 1200, unit: "unidad" },
      ]
    },
  ];

  const quantities = {};
  const products = categories.flatMap(c => c.products);
  products.forEach(p => quantities[p.id] = 0);

  function renderCards() {
    const grid = document.getElementById('grid');
    grid.innerHTML = categories.map(cat => `
      <div style="grid-column: 1 / -1;">
        <p style="font-size:0.7rem;letter-spacing:0.2em;text-transform:uppercase;
          color:var(--brown-light);margin-bottom:0.75rem;padding-bottom:0.5rem;
          border-bottom:1px solid #e8d5c0;">${cat.name}</p>
      </div>
      ${cat.products.map(p => `
        <div class="card">
          <div class="card-img">${p.emoji}</div>
          <div class="card-body">
            <h3 class="card-name">${p.name}</h3>
            <p class="card-desc">${p.desc}</p>
            <div class="card-footer">
              <span class="card-price">$${p.price.toLocaleString('es-AR')}
                <small style="font-size:0.6em;font-weight:400;color:var(--muted)">/ ${p.unit}</small>
              </span>
              <div class="qty-control">
                <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
                <span class="qty-num" id="qty-${p.id}">0</span>
                <button class="qty-btn" onclick="changeQty(${p.id}, +1)">+</button>
              </div>
            </div>
          </div>
        </div>
      `).join('')}
    `).join('');
  }

  function changeQty(id, delta) {
    quantities[id] = Math.max(0, quantities[id] + delta);
    document.getElementById(`qty-${id}`).textContent = quantities[id];
    updateSummary();
    updateBadge();
  }

  function updateBadge() {
    const total = products.reduce((sum, p) => sum + quantities[p.id], 0);
    const badge = document.getElementById('cart-badge');
    badge.textContent = total;
    badge.classList.toggle('visible', total > 0);
  }

  function updateSummary() {
    const summary = document.getElementById('summary');
    const items = products.filter(p => quantities[p.id] > 0);

    if (items.length === 0) {
      summary.innerHTML = `<span style="display:flex;align-items:center;justify-content:center;min-height:80px;width:100%;color:#a08060;font-style:italic;">Todavía no agregaste nada 🍫</span>`;
      return;
    }

    let total = 0;
    const lines = items.map(p => {
      const subtotal = p.price * quantities[p.id];
      total += subtotal;
      return `<div style="display:flex;justify-content:space-between;gap:1rem;">
        <span>${quantities[p.id]}× ${p.name}</span>
        <span style="white-space:nowrap;">$${subtotal.toLocaleString('es-AR')}</span>
      </div>`;
    });

    lines.push(`<div style="margin-top:0.75rem;padding-top:0.75rem;border-top:1px solid rgba(255,255,255,0.15);display:flex;justify-content:space-between;font-weight:700;color:var(--caramel)">
      <span>Total</span><span>$${total.toLocaleString('es-AR')}</span>
    </div>`);

    summary.innerHTML = lines.join('');
  }

  function toggleCart() {
    const panel = document.getElementById('cart-panel');
    if (panel.classList.contains('open')) {
      closeCart();
    } else {
      openCart();
    }
  }

  function openCart() {
    document.getElementById('cart-panel').classList.add('open');
    document.getElementById('cart-overlay').classList.add('visible');
    document.body.style.overflow = 'hidden';
  }

  function closeCart() {
    document.getElementById('cart-panel').classList.remove('open');
    document.getElementById('cart-overlay').classList.remove('visible');
    document.body.style.overflow = '';
  }

  function sendOrder() {
    const items = products.filter(p => quantities[p.id] > 0);
    if (items.length === 0) {
      alert("Primero agregá algo al pedido 😊");
      return;
    }

    let total = 0;
    const lines = items.map(p => {
      const subtotal = p.price * quantities[p.id];
      total += subtotal;
      return `• ${quantities[p.id]}x ${p.name} → $${subtotal.toLocaleString('es-AR')}`;
    });

    const notes = document.getElementById('notes').value.trim();
    const notesLine = notes ? `\n\n📝 Aclaración: ${notes}` : '';

    const msg = `¡Hola! Quiero hacer un pedido de ${SHOP_NAME}:\n\n${lines.join('\n')}\n\n💰 Total: $${total.toLocaleString('es-AR')}${notesLine}`;
    const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    window.open(url, '_blank');
  }

  renderCards();
</script>
</body>
</html>
